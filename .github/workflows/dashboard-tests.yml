# Roda a suíte de testes do dashboard (Vitest) em cada PR/push.
# Espelha o padrão de regressão de contract-tests.yml (ver docs/test-strategy.md 1.6).
name: dashboard-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run test
